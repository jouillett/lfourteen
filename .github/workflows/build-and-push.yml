name: Build and Push Standalone for Airspace

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Next.js App
        run: npm run build
        
      - name: Prepare Standalone Directory
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          
      - name: Deploy to Airspace Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .next/standalone
          publish_branch: airspace-deploy
          force_orphan: true
