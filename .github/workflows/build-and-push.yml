name: Build and Push Standalone for Airspace

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Next.js App
        run: npm run build
        
      - name: Prepare Standalone Directory
        run: |
          mkdir -p .next/standalone-wrap/app
          cp -a .next/standalone/. .next/standalone-wrap/app/
          mkdir -p .next/standalone-wrap/app/.next/static
          cp -a .next/static/. .next/standalone-wrap/app/.next/static/
          mkdir -p .next/standalone-wrap/app/public
          cp -a public/. .next/standalone-wrap/app/public/
          
          cat << 'EOF' > .next/standalone-wrap/package.json
          {
            "name": "airspace-runner",
            "version": "1.0.0",
            "scripts": {
              "start": "cd app && node server.js"
            }
          }
          EOF
          
      - name: Deploy to Airspace Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .next/standalone-wrap
          publish_branch: airspace-deploy
          force_orphan: true
