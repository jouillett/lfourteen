<style>
        body { background-color: #FFF8F3; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed m-0 p-0 overflow-x-hidden">

<script>
    function resizeMainContainer() {
        const main = document.getElementById('main-container');
        if (main) {
            main.style.width = window.innerWidth + 'px';
            main.style.minHeight = window.innerHeight + 'px';
        }
    }
    window.addEventListener('resize', resizeMainContainer);
    window.addEventListener('load', resizeMainContainer);
    resizeMainContainer();
</script>

<main id="main-container" class="w-full flex-1 flex flex-col relative m-0 p-md md:p-lg box-border">
<!-- Summary Section: Bento Style -->
<section class="mb-lg">
<div class="flex justify-between items-center mb-md">
    <h1 class="font-headline-lg text-headline-lg text-primary">고객 리뷰</h1>
    <button onclick="document.referrer ? window.location.href = document.referrer : window.location.href = 'mall.html'" class="text-on-surface-variant hover:text-primary transition-colors cursor-pointer flex items-center justify-center p-2 rounded-full hover:bg-surface-container">
        <span class="material-symbols-outlined text-[28px]">close</span>
    </button>
</div>
<div class="w-full">
<!-- Total Reviews Card -->
<div class="bg-surface-container-low rounded-xl p-md flex items-center justify-between shadow-sm transition-transform hover:scale-[1.01] duration-300">
<div>
<div class="flex items-baseline gap-xs mb-xs">
<span id="avg-rating" class="text-[32px] font-bold text-primary leading-tight">평균별점 4.8/5.0</span>
</div>
<div id="avg-stars-container" class="flex text-primary mt-xs">
</div>
</div>
<div class="text-right">
<p class="font-label-md text-label-md text-on-surface-variant mb-xs">총 리뷰 수</p>
<span id="total-reviews" class="text-[48px] font-bold text-primary leading-tight">1,284</span>
</div>
</div>

</div>
</section>
<!-- Filtering/Sorting Bar -->
<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-md mb-md border-b border-outline-variant pb-md">
<div class="flex gap-sm">
<button id="sort-date-btn" class="rounded-full px-md py-xs bg-primary text-on-primary font-label-md text-label-md transition-all active:scale-95">최신순</button>
<button id="sort-rating-btn" class="rounded-full px-md py-xs bg-secondary-container text-on-secondary-container font-label-md text-label-md hover:bg-outline-variant transition-all active:scale-95">별점 높은 순</button>
</div>
<div class="relative w-full sm:w-auto">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">search</span>
<input id="search-input" class="w-full sm:w-64 pl-xl pr-md py-xs bg-surface-container border border-outline-variant rounded-lg focus:outline-none focus:border-primary text-label-md font-label-md transition-colors" placeholder="리뷰 검색" type="text" lang="ko" style="ime-mode:active;"/>
</div>
</div>
<!-- Review List -->
<div id="reviews-container" class="space-y-md">
</div>
<!-- Pagination -->
<div id="pagination-container" class="mt-xl flex justify-center items-center gap-md">
</div>
<!-- Bottom Actions -->
<div class="flex justify-end p-md mt-auto">
    <button onclick="window.location.href='writereview.html'" class="bg-primary text-on-primary font-label-md text-label-md px-6 py-2.5 rounded-lg hover:bg-inverse-surface transition-colors shadow-[0_4px_12px_rgba(80,69,48,0.08)] flex items-center gap-2">
        <span class="material-symbols-outlined text-[20px]">edit</span>
        후기쓰기
    </button>
</div>
</main>

<script>
        // Micro-interaction for review items
        document.querySelectorAll('article').forEach(item => {
            item.addEventListener('mouseenter', () => {
                item.style.transform = 'translateY(-2px)';
            });
            item.addEventListener('mouseleave', () => {
                item.style.transform = 'translateY(0)';
            });
        });
    </script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('/api/review?productId=1', { cache: 'no-store' });
            const data = await res.json();
            
            if (data.success && data.reviews) {
                let allReviews = data.reviews;
                const totalCount = allReviews.length;
                let avg = '0.0';
                if (totalCount > 0) {
                    const sum = allReviews.reduce((acc, r) => acc + (Number(r.rating) || 0), 0);
                    avg = (sum / totalCount).toFixed(1);
                }
                
                const avgRatingEl = document.getElementById('avg-rating');
                if (avgRatingEl) avgRatingEl.textContent = '평균별점 ' + avg + '/5.0';
                
                const avgStarsContainer = document.getElementById('avg-stars-container');
                if (avgStarsContainer) {
                    let rating = Number(avg);
                    let html = '';
                    for (let i = 1; i <= 5; i++) {
                        if (rating >= i - 0.25) {
                            html += `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>`;
                        } else if (rating >= i - 0.75) {
                            html += `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star_half</span>`;
                        } else {
                            html += `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">star</span>`;
                        }
                    }
                    avgStarsContainer.innerHTML = html;
                }
                
                const totalReviewsEl = document.getElementById('total-reviews');
                if (totalReviewsEl) totalReviewsEl.textContent = totalCount;

                let currentPage = 1;
                const itemsPerPage = 3;
                let sortType = 'date';
                let dateOrder = 'desc';
                let ratingOrder = 'desc';
                let searchQuery = '';

                const searchInput = document.getElementById('search-input');
                const sortDateBtn = document.getElementById('sort-date-btn');
                const sortRatingBtn = document.getElementById('sort-rating-btn');
                const reviewsContainer = document.getElementById('reviews-container');
                const paginationContainer = document.getElementById('pagination-container');

                function updateSortButtons() {
                    if (sortDateBtn) {
                        sortDateBtn.textContent = dateOrder === 'desc' ? '최신순' : '과거순';
                        if (sortType === 'date') {
                            sortDateBtn.className = "rounded-full px-md py-xs bg-primary text-on-primary font-label-md text-label-md transition-all active:scale-95";
                        } else {
                            sortDateBtn.className = "rounded-full px-md py-xs bg-secondary-container text-on-secondary-container font-label-md text-label-md hover:bg-outline-variant transition-all active:scale-95";
                        }
                    }
                    if (sortRatingBtn) {
                        sortRatingBtn.textContent = ratingOrder === 'desc' ? '별점 높은 순' : '별점 낮은 순';
                        if (sortType === 'rating') {
                            sortRatingBtn.className = "rounded-full px-md py-xs bg-primary text-on-primary font-label-md text-label-md transition-all active:scale-95";
                        } else {
                            sortRatingBtn.className = "rounded-full px-md py-xs bg-secondary-container text-on-secondary-container font-label-md text-label-md hover:bg-outline-variant transition-all active:scale-95";
                        }
                    }
                }

                function render() {
                    let filteredReviews = allReviews;
                    if (searchQuery.trim()) {
                        const q = searchQuery.toLowerCase();
                        filteredReviews = allReviews.filter(r => 
                            (r.content && r.content.toLowerCase().includes(q)) ||
                            (r.customer_name && r.customer_name.toLowerCase().includes(q))
                        );
                    }

                    filteredReviews.sort((a, b) => {
                        if (sortType === 'date') {
                            const valA = new Date(a.created_at).getTime();
                            const valB = new Date(b.created_at).getTime();
                            return dateOrder === 'desc' ? valB - valA : valA - valB;
                        } else {
                            const valA = Number(a.rating) || 0;
                            const valB = Number(b.rating) || 0;
                            return ratingOrder === 'desc' ? valB - valA : valA - valB;
                        }
                    });

                    const totalPages = Math.ceil(filteredReviews.length / itemsPerPage) || 1;
                    if (currentPage > totalPages) currentPage = totalPages;
                    
                    const startIndex = (currentPage - 1) * itemsPerPage;
                    const paginated = filteredReviews.slice(startIndex, startIndex + itemsPerPage);

                    if (reviewsContainer) {
                        reviewsContainer.innerHTML = '';
                        paginated.forEach(review => {
                            let rVal = Number(review.rating) || 0;
                            let stars = '';
                            for (let i = 1; i <= 5; i++) {
                                if (rVal >= i - 0.25) {
                                    stars += `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>`;
                                } else if (rVal >= i - 0.75) {
                                    stars += `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star_half</span>`;
                                } else {
                                    stars += `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">star</span>`;
                                }
                            }
                            
                            let formattedDate = '';
                            if (review.created_at) {
                                const dateObj = new Date(review.created_at);
                                if (!isNaN(dateObj.getTime())) {
                                    const yy = String(dateObj.getFullYear());
                                    const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                                    const dd = String(dateObj.getDate()).padStart(2, '0');
                                    formattedDate = `${yy}.${mm}.${dd}`;
                                }
                            }

                            let contentStr = review.content || '';
                            let nameStr = review.customer_name || '';
                            if (searchQuery.trim()) {
                                const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                                const regex = new RegExp('(' + escapeRegExp(searchQuery.trim()) + ')', 'gi');
                                contentStr = contentStr.replace(regex, '<strong class="font-bold text-primary">$1</strong>');
                                nameStr = nameStr.replace(regex, '<strong class="font-bold text-primary">$1</strong>');
                            }
                            
                            reviewsContainer.innerHTML += `
                            <article class="bg-surface-container-low rounded-xl p-md border border-transparent hover:border-outline-variant transition-all duration-300">
                                <div class="flex justify-between items-start mb-sm">
                                    <div class="flex flex-col">
                                        <div class="flex text-primary mb-xs">
                                            ${stars}
                                        </div>
                                        <div class="flex gap-sm items-center">
                                            <span class="font-label-md text-label-md text-on-surface font-bold">${nameStr}</span>
                                            <span class="w-1 h-1 rounded-full bg-outline-variant"></span>
                                            <span class="font-caption text-caption text-outline">${formattedDate}</span>
                                        </div>
                                    </div>
                                    <button class="material-symbols-outlined text-outline hover:text-primary transition-colors">more_horiz</button>
                                </div>
                                <p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                                    ${contentStr}
                                </p>
                            </article>
                            `;
                        });
                    }

                    if (paginationContainer) {
                        let html = '';
                        const prevDisabled = currentPage === 1 ? 'disabled opacity-30' : '';
                        html += `<button class="material-symbols-outlined text-outline hover:text-primary transition-colors ${prevDisabled}" onclick="window.goToPage(${currentPage - 1})">chevron_left</button>`;
                        html += `<div class="flex gap-sm">`;
                        for (let i = 1; i <= totalPages; i++) {
                            if (i === currentPage) {
                                html += `<button class="w-8 h-8 rounded-full bg-primary text-on-primary font-label-md text-label-md flex items-center justify-center">${i}</button>`;
                            } else {
                                html += `<button class="w-8 h-8 rounded-full hover:bg-surface-container font-label-md text-label-md flex items-center justify-center transition-colors" onclick="window.goToPage(${i})">${i}</button>`;
                            }
                        }
                        html += `</div>`;
                        const nextDisabled = currentPage === totalPages ? 'disabled opacity-30' : '';
                        html += `<button class="material-symbols-outlined text-outline hover:text-primary transition-colors ${nextDisabled}" onclick="window.goToPage(${currentPage + 1})">chevron_right</button>`;
                        paginationContainer.innerHTML = html;
                    }

                    updateSortButtons();
                }

                window.goToPage = function(page) {
                    let activeReviews = allReviews;
                    if (searchQuery.trim()) {
                        const q = searchQuery.toLowerCase();
                        activeReviews = allReviews.filter(r => 
                            (r.content && r.content.toLowerCase().includes(q)) ||
                            (r.customer_name && r.customer_name.toLowerCase().includes(q))
                        );
                    }
                    const totalPages = Math.ceil(activeReviews.length / itemsPerPage) || 1;
                    if (page >= 1 && page <= totalPages) {
                        currentPage = page;
                        render();
                    }
                };

                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        searchQuery = e.target.value;
                        currentPage = 1;
                        render();
                    });
                }

                if (sortDateBtn) {
                    sortDateBtn.addEventListener('click', () => {
                        if (sortType === 'date') {
                            dateOrder = dateOrder === 'desc' ? 'asc' : 'desc';
                        } else {
                            sortType = 'date';
                        }
                        currentPage = 1;
                        render();
                    });
                }

                if (sortRatingBtn) {
                    sortRatingBtn.addEventListener('click', () => {
                        if (sortType === 'rating') {
                            ratingOrder = ratingOrder === 'desc' ? 'asc' : 'desc';
                        } else {
                            sortType = 'rating';
                        }
                        currentPage = 1;
                        render();
                    });
                }

                render();
            }
        } catch (err) {
            console.error('Error fetching reviews:', err);
        }
    });
</script>
</body></html>
