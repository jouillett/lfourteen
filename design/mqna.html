    async function loadQnaData() {
        try {
            const res = await fetch('/api/qna?productId=1', { cache: 'no-store' });
            const data = await res.json();
            if (data.success) {
                qnaData = data.data;
            }
        } catch (e) {
            console.error(e);
        }
        render();
    }
    const urlParams = new URLSearchParams(window.location.search);
    const loggedInUserId = parseInt(urlParams.get('userId')) || parseInt(localStorage.getItem('userId')) || 1;

    let currentFilter = 'all';
    let excludeSecret = false;
    let myQnaOnly = false;
    let searchTerm = '';
    let currentPage = 1;
    const itemsPerPage = 5;

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function highlight(text) {
        if (!searchTerm) return escapeHtml(text).replace(/\n/g, '<br/>');
        const escapedTerm = escapeHtml(searchTerm);
        const escapedText = escapeHtml(text);
        const regex = new RegExp(escapedTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        return escapedText.replace(regex, match => `<b>${match}</b>`).replace(/\n/g, '<br/>');
    }

    function toggleExpanded(element, id) {
        const item = qnaData.find(d => d.id === id);
        if (item.is_secret && item.customer_id !== loggedInUserId) {
            alert('비밀글입니다.');
            return;
        }
        element.classList.toggle('expanded');
    }

    function render() {
        let filtered = qnaData.filter(item => {
            if (currentFilter === 'waiting' && item.is_answer !== 0) return false;
            if (currentFilter === 'completed' && item.is_answer !== 1) return false;
            if (excludeSecret && item.is_secret === 1) return false;
            if (myQnaOnly && item.customer_id !== loggedInUserId) return false;
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                const contentMatch = item.content && item.content.toLowerCase().includes(term);
                const answerMatch = item.answer_content && item.answer_content.toLowerCase().includes(term);
                if (!contentMatch && !answerMatch) return false;
            }
            return true;
        });

        const totalPages = Math.max(1, Math.ceil(filtered.length / itemsPerPage));
        if (currentPage > totalPages) currentPage = totalPages;
        
        const startIdx = (currentPage - 1) * itemsPerPage;
        const pageData = filtered.slice(startIdx, startIdx + itemsPerPage);

        const listContainer = document.getElementById('qna-list');
        const isMobile = window.location.pathname.includes('mqna.html');

        listContainer.innerHTML = '';

        if (pageData.length === 0) {
            listContainer.innerHTML = '<div class="text-center py-12 text-on-surface-variant">등록된 게시글이 없습니다.</div>';
        } else {
            pageData.forEach(item => {
                const titleLine = escapeHtml(item.content.split('\n')[0]);
                const titleHTML = searchTerm ? highlight(item.content.split('\n')[0]) : titleLine;

                let articleHTML = '';
                if (!isMobile) {
                    articleHTML = `
                        <article onclick="toggleExpanded(this, ${item.id})" class="bg-surface-container-low rounded-lg p-md cursor-pointer hover:bg-surface-container transition-colors group flex flex-col gap-0 border border-transparent hover:border-outline-variant">
                            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div class="flex items-center gap-md flex-grow min-w-0">
                                    ${item.is_answer ? `<span class="bg-primary-container text-on-primary-container font-caption text-caption px-3 py-1.5 rounded-sm tracking-wide shrink-0">답변완료</span>` : `<span class="bg-surface-variant text-on-surface-variant font-caption text-caption px-3 py-1.5 rounded-sm tracking-wide shrink-0">답변대기</span>`}
                                    <h3 class="font-body-md text-body-md text-on-surface font-semibold flex items-center gap-xs group-hover:text-primary transition-colors m-0 min-w-0 group-[.expanded]:hidden">
                                        ${item.is_secret ? `<span class="material-symbols-outlined text-[18px] text-outline">lock</span>` : ''}
                                        <span class="truncate">${titleHTML}</span>
                                    </h3>
                                </div>
                                <div class="flex items-center text-on-surface-variant font-caption text-caption gap-md shrink-0">
                                    <div class="flex items-center gap-xs">
                                        <span class="material-symbols-outlined text-[16px]">person</span>
                                        <span>${item.author_name}</span>
                                    </div>
                                    <span class="text-secondary">${formatDate(item.wrtten_at)}</span>
                                </div>
                            </div>
                            <div class="hidden group-[.expanded]:block mt-4 pt-4 border-t border-outline-variant flex flex-col gap-md">
                                <div class="text-on-surface font-body-md whitespace-pre-wrap">${highlight(item.content)}</div>
                                ${item.is_answer ? `
                                <div class="bg-surface rounded-lg p-4 text-on-surface-variant font-body-md mt-4 border border-outline-variant border-opacity-30">
                                    <span class="font-semibold text-primary mb-2 block flex items-center gap-1">
                                        <span class="material-symbols-outlined text-[18px]">support_agent</span>
                                        기쁜하루
                                    </span>
                                    ${highlight(item.answer_content)}
                                </div>` : ''}
                            </div>
                        </article>
                    `;
                } else {
                    articleHTML = `
                        <article onclick="toggleExpanded(this, ${item.id})" class="bg-surface-container-low rounded-lg p-md cursor-pointer hover:bg-surface-container transition-colors group min-w-0">
                            <div class="flex justify-between items-start mb-sm">
                                ${item.is_answer ? `<span class="bg-primary-container text-on-primary-container font-caption text-caption px-2 py-1 rounded-sm tracking-wide">답변완료</span>` : `<span class="bg-surface-variant text-on-surface-variant font-caption text-caption px-2 py-1 rounded-sm tracking-wide">답변대기</span>`}
                                <span class="font-caption text-caption text-secondary">${formatDate(item.wrtten_at)}</span>
                            </div>
                            <h3 class="font-label-md text-label-md text-on-surface font-semibold mb-xs flex items-center gap-xs group-hover:text-primary transition-colors group-[.expanded]:hidden truncate min-w-0">
                                ${item.is_secret ? `<span class="material-symbols-outlined text-[16px] text-outline">lock</span>` : ''}
                                <span class="truncate">${titleHTML}</span>
                            </h3>
                            <div class="flex items-center text-on-surface-variant font-caption text-caption gap-xs group-[.expanded]:hidden">
                                <span class="material-symbols-outlined text-[14px]">person</span>
                                <span>${item.author_name}</span>
                            </div>
                            <div class="hidden group-[.expanded]:block mt-4 pt-4 border-t border-outline-variant">
                                <div class="mb-4 text-on-surface font-label-md whitespace-pre-wrap">${highlight(item.content)}</div>
                                ${item.is_answer ? `
                                <div class="bg-surface rounded-lg p-3 text-on-surface-variant font-label-md mb-4">
                                    <span class="font-bold text-primary mb-1 block flex items-center gap-1">
                                        <span class="material-symbols-outlined text-[16px]">support_agent</span>
                                        기쁜하루
                                    </span>
                                    ${highlight(item.answer_content)}
                                </div>` : ''}
                                <div class="flex items-center text-on-surface-variant font-caption text-caption gap-xs">
                                    <span class="material-symbols-outlined text-[14px]">person</span>
                                    <span>${item.author_name}</span>
                                </div>
                            </div>
                        </article>
                    `;
                }
                listContainer.insertAdjacentHTML('beforeend', articleHTML);
            });
        }

        const nav = document.getElementById('pagination');
        if (!nav) return;
        nav.innerHTML = '';
        
        let navHTML = '';
        const btnClass = isMobile ? 'w-8 h-8' : 'w-10 h-10';
        
        navHTML += `
            <button onclick="prevPage()" class="${btnClass} flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container transition-colors disabled:opacity-50" ${currentPage === 1 ? 'disabled' : ''}>
                <span class="material-symbols-outlined">chevron_left</span>
            </button>
        `;

        for (let i = 1; i <= totalPages; i++) {
            const activeClass = i === currentPage ? 'bg-secondary-container text-on-secondary-container' : 'text-on-surface hover:bg-surface-container transition-colors';
            navHTML += `<button onclick="changePage(${i})" class="page-btn ${btnClass} flex items-center justify-center rounded-full ${activeClass} font-label-md text-label-md">${i}</button>`;
        }

        navHTML += `
            <button onclick="nextPage()" class="${btnClass} flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container transition-colors disabled:opacity-50" ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}>
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
        `;
        
        nav.innerHTML = navHTML;
    }

    function changePage(page) {
        currentPage = page;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function prevPage() {
        if (currentPage > 1) {
            changePage(currentPage - 1);
        }
    }

    function nextPage() {
        changePage(currentPage + 1);
    }

    function setupEventListeners() {
        const filterBtns = document.querySelectorAll('#filter-buttons button');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => {
                    b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'border-transparent');
                    b.classList.add('bg-surface', 'border-outline-variant', 'text-on-surface-variant');
                });
                e.target.classList.remove('bg-surface', 'border-outline-variant', 'text-on-surface-variant');
                e.target.classList.add('bg-secondary-container', 'text-on-secondary-container', 'border-transparent');
                
                const filterText = e.target.innerText.trim();
                if (filterText === '전체') {
                    currentFilter = 'all';
                    if (myQnaOnly) {
                        myQnaOnly = false;
                        const myQnaBtn = document.getElementById('my-qna-btn');
                        if (myQnaBtn) {
                            myQnaBtn.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                            if (window.location.pathname.includes('mqna.html')) {
                                myQnaBtn.classList.add('border-outline-variant', 'text-on-surface-variant');
                            } else {
                                myQnaBtn.classList.add('border-outline-variant', 'text-primary');
                            }
                        }
                    }
                    if (excludeSecret) {
                        excludeSecret = false;
                        const excludeCheckbox = document.getElementById('exclude-private');
                        if (excludeCheckbox) excludeCheckbox.checked = false;
                    }
                    if (searchTerm) {
                        searchTerm = '';
                        const searchInputEl = document.getElementById('search-input');
                        if (searchInputEl) searchInputEl.value = '';
                    }
                }
                else if (filterText === '답변대기') currentFilter = 'waiting';
                else if (filterText === '답변완료') currentFilter = 'completed';
                
                currentPage = 1;
                render();
            });
        });

        const excludeCheckbox = document.getElementById('exclude-private');
        if (excludeCheckbox) {
            excludeCheckbox.addEventListener('change', (e) => {
                excludeSecret = e.target.checked;
                currentPage = 1;
                render();
            });
        }

        const myQnaBtn = document.getElementById('my-qna-btn');
        if (myQnaBtn) {
            myQnaBtn.addEventListener('click', (e) => {
                myQnaOnly = !myQnaOnly;
                if (myQnaOnly) {
                    myQnaBtn.classList.remove('border-outline-variant', 'text-primary', 'text-on-surface-variant');
                    myQnaBtn.classList.add('bg-primary', 'text-on-primary', 'border-primary');
                } else {
                    myQnaBtn.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                    const isMobile = window.location.pathname.includes('mqna.html');
                    if (isMobile) {
                        myQnaBtn.classList.add('border-outline-variant', 'text-on-surface-variant');
                    } else {
                        myQnaBtn.classList.add('border-outline-variant', 'text-primary');
                    }
                }
                currentPage = 1;
                render();
            });
        }

        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        
        const doSearch = () => {
            searchTerm = searchInput.value.trim();
            currentPage = 1;
            render();
        };

        if (searchBtn) searchBtn.addEventListener('click', doSearch);
        if (searchInput) {
            searchInput.addEventListener('focus', function() {
                this.setAttribute('lang', 'ko');
            });
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') doSearch();
            });
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        setupEventListeners();
        loadQnaData();
    });

    document.addEventListener('DOMContentLoaded', () => {
        const writeQnaBtn = document.getElementById('write-qna-btn');
        if(writeQnaBtn) {
            writeQnaBtn.addEventListener('click', () => {
                if (localStorage.getItem('isLoggedIn') === 'true' && localStorage.getItem('userId')) {
                    window.location.href = 'mwriteqna.html';
                } else {
                    localStorage.setItem('loginRedirect', 'mwriteqna.html');
                    window.location.href = 'mlogin.html';
                }
            });
        }
    });
</script>
