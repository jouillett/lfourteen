<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff8f3; /* surface */
            color: #1f1b15; /* on-surface */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .ambient-shadow {
            box-shadow: 0 10px 25px -5px rgba(105, 93, 70, 0.08), 0 8px 10px -6px rgba(105, 93, 70, 0.04);
        }

        }

<body class="bg-surface text-on-surface flex flex-col min-h-screen">
<!-- Top Navigation (Suppressed per rules for transactional page, but header requested) -->
<header class="flex justify-between items-center h-16 px-md w-full max-w-container-max mx-auto mt-md">
<div class="flex items-center gap-md">
<img src="https://capofcom.cafe24.com/l14_coordy/images/l14.jpeg" style="width: 24px; height: 24px; border-radius: 50%;margin-right: -15px; vertical-align: middle;" alt="L14 Cordy Logo">
<a class="text-headline-md font-headline-md font-bold text-primary" href="#">L14 Cordy</a>
</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-md">
<!-- Authentication Card -->
<div class="bg-surface-container-low rounded-xl ambient-shadow p-lg w-full max-w-container-max flex flex-col gap-xl">
<!-- Header Section -->
<div class="flex flex-col gap-sm text-center pt-sm">
<h1 class="font-headline-lg text-headline-lg text-on-surface">로그인에 사용할<br/>새 비밀번호를 입력해 주세요</h1>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-md">
<!-- Input Group 1 -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="new-password">새 비밀번호</label>
<div class="relative flex items-center bg-surface rounded-lg border border-outline-variant input-focus-glow transition-all duration-200">
<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant py-sm pl-sm pr-12 rounded-lg" id="new-password" placeholder="새 비밀번호 입력" type="password"/>
<button id="toggle-new-password" class="absolute right-sm text-outline-variant hover:text-primary transition-colors focus:outline-none flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<p class="font-caption text-caption text-on-surface-variant mt-1">영문, 숫자, 특수문자가 모두 들어간 8-16자</p>
</div>
<!-- Input Group 2 -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="confirm-password">새 비밀번호 확인</label>
<div class="relative flex items-center bg-surface rounded-lg border border-outline-variant input-focus-glow transition-all duration-200">
<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant py-sm pl-sm pr-12 rounded-lg" id="confirm-password" placeholder="비밀번호 한 번 더 입력" type="password"/>
<button id="toggle-confirm-password" class="absolute right-sm text-outline-variant hover:text-primary transition-colors focus:outline-none flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<p id="form-error-message" class="text-error font-caption text-caption mt-xs mb-sm hidden text-center" style="color: #ba1a1a;"></p>
<button class="mt-sm w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-sm rounded-lg hover:bg-primary-fixed transition-all duration-200 active:scale-95 flex justify-center items-center" type="submit">
                    확인
                </button>
</form>
</div>
</main>
<!-- Footer -->
<footer class="flex flex-col items-center py-lg space-y-sm w-full max-w-container-max mx-auto mt-auto">
<p class="font-caption text-caption text-secondary">© 2026 L14 Cordy. All rights reserved.</p>
</footer>
<script type="module">
    import { FormApi } from 'https://cdn.jsdelivr.net/npm/@tanstack/form-core@0.40.4/+esm';
    import { z } from 'https://cdn.jsdelivr.net/npm/zod@3.22.4/+esm';

    document.addEventListener("DOMContentLoaded", () => {
        const toggleVisibility = (inputId, buttonId) => {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);
            if (input && button) {
                const icon = button.querySelector('.material-symbols-outlined');
                button.addEventListener('click', () => {
                    if (input.type === 'password') {
                        input.type = 'text';
                        if (icon) icon.textContent = 'visibility';
                    } else {
                        input.type = 'password';
                        if (icon) icon.textContent = 'visibility_off';
                    }
                });
            }
        };

        toggleVisibility('new-password', 'toggle-new-password');
        toggleVisibility('confirm-password', 'toggle-confirm-password');

        const passwordSchema = z.object({
            newPassword: z.string()
                .min(8, '비밀번호는 8자 이상이어야 합니다.')
                .max(16, '비밀번호는 16자 이하이어야 합니다.')
                .regex(/^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*()_+={}\[\]|\\:;'"<>,.?/-]).*$/, '영문, 숫자, 특수문자가 모두 포함되어야 합니다.'),
            confirmPassword: z.string().min(1, '비밀번호 확인을 입력해 주세요.')
        });

        const showError = (msg) => {
            const errorMsgEl = document.getElementById('form-error-message');
            if (errorMsgEl) {
                errorMsgEl.textContent = msg;
                errorMsgEl.classList.remove('hidden');
            }
        };

        const hideError = () => {
            const errorMsgEl = document.getElementById('form-error-message');
            if (errorMsgEl) {
                errorMsgEl.classList.add('hidden');
            }
        };

        const form = new FormApi({
            defaultValues: {
                newPassword: '',
                confirmPassword: ''
            },
            onSubmit: async ({ value }) => {
                const validationResult = passwordSchema.safeParse(value);
                if (!validationResult.success) {
                    const firstError = validationResult.error.errors[0];
                    showError(firstError.message);
                    return;
                }

                if (value.newPassword !== value.confirmPassword) {
                    alert('새 비밀번호와 비밀번호 확인이 일치하지 않습니다.');
                    const newPasswordInput = document.getElementById('new-password');
                    if (newPasswordInput) {
                        newPasswordInput.focus();
                    }
                    showError('새 비밀번호와 비밀번호 확인이 일치하지 않습니다.');
                    return;
                }

                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    const phoneVal = urlParams.get('phone') || localStorage.getItem('authPhone') || '';

                    if (!phoneVal) {
                        alert('인증된 휴대폰 번호 정보가 없습니다. 다시 인증을 진행해 주세요.');
                        window.location.href = 'password_auth.html';
                        return;
                    }

                    const response = await fetch('/api/reset-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            mobile: phoneVal,
                            password: value.newPassword
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        alert('비밀번호가 변경되었습니다.');
                        window.location.href = 'login.html';
                    } else {
                        showError(data.message || '비밀번호 변경 중 오류가 발생했습니다.');
                    }
                } catch (error) {
                    console.error('Reset password error:', error);
                    showError('서버와 통신하는 중 오류가 발생했습니다.');
                }
            }
        });

        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');

        if (newPasswordInput) {
            newPasswordInput.addEventListener('input', (e) => {
                form.setFieldValue('newPassword', e.target.value);
                hideError();
            });
        }

        if (confirmPasswordInput) {
            confirmPasswordInput.addEventListener('input', (e) => {
                form.setFieldValue('confirmPassword', e.target.value);
                hideError();
            });
        }

        const htmlForm = document.querySelector('form');
        if (htmlForm) {
            htmlForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                await form.handleSubmit();
            });
        }
    });
</script>
</body></html>
