                    주문 내역 보기
                </button>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const orderIdRaw = urlParams.get('orderId');
    const orderId = orderIdRaw ? orderIdRaw.replace(/^order_/, '') : null;
    const usedPoints = urlParams.get('usedPoints');
    const userId = urlParams.get('userId');
    const amount = urlParams.get('amount');
    const paymentKey = urlParams.get('paymentKey');
    const fallbackMethod = sessionStorage.getItem('selectedPaymentMethod') || '결제수단';

    if (orderId) {
        const elOrderId = document.getElementById('display-order-id');
        if (elOrderId) elOrderId.textContent = orderId;
    }
    if (amount) {
        const elAmount = document.getElementById('display-amount');
        if (elAmount) elAmount.textContent = '\u20a9' + Number(amount).toLocaleString();
    }

    const elMethod = document.getElementById('display-payment-method');
    if (elMethod) elMethod.textContent = '';

    // Read sessionStorage data BEFORE any removal
    let pendingOrderObj = null;
    let pendingAddressObj = null;

    const pendingOrderStr = sessionStorage.getItem('pendingOrderInfo');
    if (pendingOrderStr) {
        try { pendingOrderObj = JSON.parse(pendingOrderStr); } catch(e) {}
    }
    const pendingAddressStr = sessionStorage.getItem('pendingAddress');
    if (pendingAddressStr) {
        try { pendingAddressObj = JSON.parse(pendingAddressStr); } catch(e) {}
    }

    // Always ensure userId is set - use URL param as fallback if sessionStorage missing
    if (!pendingOrderObj) pendingOrderObj = {};
    if (!pendingOrderObj.userId && userId) pendingOrderObj.userId = userId;
    // Also get source/priceId from URL if not in sessionStorage
    if (!pendingOrderObj.source) pendingOrderObj.source = urlParams.get('source') || null;
    if (!pendingOrderObj.priceId) pendingOrderObj.priceId = urlParams.get('priceId') || null;

    if (paymentKey && orderIdRaw && amount) {
        fetch('/api/order/confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                paymentKey,
                orderId: orderIdRaw,
                amount,
                pendingAddress: pendingAddressObj,
                orderInfo: pendingOrderObj
            })
        })
        .then(res => res.json())
        .then(data => {
            // Clean up sessionStorage after API call
            sessionStorage.removeItem('pendingOrderInfo');
            sessionStorage.removeItem('pendingAddress');

            if (data.success && data.payment) {
                let realMethod = data.payment.method || data.payment.type || '';
                if (data.payment.easyPay && data.payment.easyPay.provider) realMethod = data.payment.easyPay.provider;
                if (data.payment.card) realMethod = '카드';
                if (data.payment.transfer) realMethod = '계좌이체';
                if (data.payment.virtualAccount) realMethod = '가상계좌';
                if (data.payment.mobilePhone) realMethod = '휴대폰';
                if (realMethod === 'QUICK_TRANSFER') realMethod = '퀵계좌이체';
                if (elMethod) elMethod.textContent = realMethod || fallbackMethod;
                sessionStorage.setItem('selectedPaymentMethod', realMethod);

                // Deduct points after successful payment
                if (usedPoints && userId && Number(usedPoints) > 0) {
                    fetch('/api/order/deduct-points', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: userId, usedPoints: Number(usedPoints) })
                    }).catch(err => console.error(err));
                }
            } else {
                console.error('[payment_done] confirm failed:', data);
                alert('[DEBUG] 주문 저장 실패: ' + (data.message || JSON.stringify(data)));
                if (elMethod) elMethod.textContent = fallbackMethod;
            }
        })
        .catch(err => {
            console.error(err);
            alert('[DEBUG] 네트워크 오류: ' + err.message);
            if (elMethod) elMethod.textContent = fallbackMethod;
        });
    } else {
        if (elMethod) elMethod.textContent = fallbackMethod;
    }
});
</script>
