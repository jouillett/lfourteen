<span class="material-symbols-outlined text-[40px] text-outline-variant cursor-pointer hover:scale-110 active:scale-95 transition-transform" data-icon="star" data-value="2">star</span>

<span class="material-symbols-outlined text-[40px] text-outline-variant cursor-pointer hover:scale-110 active:scale-95 transition-transform" data-icon="star" data-value="4">star</span>
<span class="material-symbols-outlined text-[40px] text-outline-variant cursor-pointer hover:scale-110 active:scale-95 transition-transform" data-icon="star" data-value="5">star</span>
</div>
</div>

                리뷰 등록
            </button>
</div>
</main>
<script>
        // Star Rating Interactive Logic
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('#star-rating-container span');
            let currentRating = 0;

            const updateStars = (rating) => {
                stars.forEach((star, index) => {
                    if (index < rating) {
                        star.classList.add('star-filled');
                        star.classList.remove('text-outline-variant');
                    } else {
                        star.classList.remove('star-filled');
                        star.classList.add('text-outline-variant');
                    }
                });
            };

            stars.forEach((star, index) => {
                // Hover effect
                star.addEventListener('mouseenter', () => {
                    updateStars(index + 1);
                });

                // Reset on mouseleave container
                star.parentElement.addEventListener('mouseleave', () => {
                    updateStars(currentRating);
                });

                // Click to set rating
                star.addEventListener('click', () => {
                    currentRating = index + 1;
                    updateStars(currentRating);
                });
            });
        });
    </script>
