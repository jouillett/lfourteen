<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff8f3;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            box-shadow: 0 10px 40px -10px rgba(74, 69, 62, 0.08);

<body class="bg-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center h-16 px-md w-full max-w-container-max mx-auto mt-md">
<div class="flex items-center gap-md">
<img src="https://capofcom.cafe24.com/l14_coordy/images/l14.jpeg" style="width: 24px; height: 24px; border-radius: 50%;margin-right: -15px; vertical-align: middle;" alt="L14 Cordy Logo">
<a class="text-headline-md font-headline-md font-bold text-primary" href="#">L14 Cordy</a>
</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-md pb-xl">
<section class="w-full max-w-[440px] bg-surface-container-low rounded-xl p-lg ambient-shadow">
<!-- Heading Section -->
<div class="mb-xl">
<h2 class="font-headline-md text-headline-md text-on-surface leading-tight">회원가입을 위해 휴대폰 번호 인증을 진행할게요</h2>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">휴대폰 번호</label>
<div class="flex gap-base">
<div class="relative flex-grow">
<input id="phone-input" class="w-full bg-[#FDF8F4] border-[#655D49] border rounded-lg py-md px-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all placeholder:text-outline" placeholder="010-1234-5678" type="tel"/>
</div>
<button id="auth-btn" disabled class="whitespace-nowrap bg-secondary-container text-on-secondary-container font-label-md text-label-md px-md rounded-lg hover:bg-outline-variant transition-colors active-scale disabled:opacity-50 disabled:cursor-not-allowed" type="button">
                            인증하기
                        </button>
</div>
</div>
<!-- Spacer -->
<div class="h-sm"></div>
<!-- Primary Action Button -->
<button id="next-btn" disabled class="w-full bg-primary-container text-on-primary-container font-headline-md text-[18px] font-bold py-md rounded-lg shadow-sm hover:opacity-90 active-scale transition-all disabled:opacity-50 disabled:cursor-not-allowed" type="submit">
                    다음
                </button>
</form>
<!-- Decorative Visual (Contextual) -->
<div class="mt-xl pt-lg border-t border-outline-variant/30 flex justify-center">
<div class="flex flex-col items-center gap-base">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-primary">sms</span>
</div>
<p class="font-caption text-caption text-on-surface-variant text-center px-xl">보안을 위해 인증 코드를 입력해야 합니다. 인증 문자는 최대 3분 이내에 발송됩니다.</p>
</div>
</div>
</section>
</main>
<!-- Shared Footer -->
<footer class="flex flex-col items-center justify-center py-md w-full gap-sm bg-transparent">
<p class="font-label-md text-label-md text-on-surface-variant opacity-60">© 2026 L14 Cordy. All rights reserved.</p>
</footer>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const phoneInput = document.getElementById('phone-input');
        const authBtn = document.getElementById('auth-btn');
        const nextBtn = document.getElementById('next-btn');
        const form = document.querySelector('form');
        let generatedCode = '';

        if (phoneInput && authBtn) {
            let previousValue = '';
            
            // Set initial value from query param if available
            const urlParams = new URLSearchParams(window.location.search);
            const phoneParam = urlParams.get('phone');
            if (phoneParam) {
                let clean = phoneParam.replace(/\D/g, '');
                if (clean.length === 11) {
                    phoneInput.value = `${clean.substring(0, 3)}-${clean.substring(3, 7)}-${clean.substring(7)}`;
                } else {
                    phoneInput.value = phoneParam;
                }
                previousValue = phoneInput.value;
                if (phoneInput.value.length === 13) {
                    authBtn.removeAttribute('disabled');
                }
            }
            
            phoneInput.addEventListener('focus', () => {
                if (!phoneInput.value.startsWith('010-')) {
                    phoneInput.value = '010-';
                }
                previousValue = phoneInput.value;
                setTimeout(() => {
                    phoneInput.setSelectionRange(phoneInput.value.length, phoneInput.value.length);
                }, 0);
                if (phoneInput.value.length === 13) {
                    authBtn.removeAttribute('disabled');
                } else {
                    authBtn.setAttribute('disabled', 'true');
                }
            });

            phoneInput.addEventListener('input', (e) => {
                let val = e.target.value;
                
                if (val.length < 4 || !val.startsWith('010-')) {
                    e.target.value = '010-';
                    previousValue = '010-';
                    authBtn.setAttribute('disabled', 'true');
                    return;
                }
                
                if (previousValue.endsWith('-') && val.length < previousValue.length) {
                    if (val.endsWith('-')) {
                        val = val.slice(0, -1);
                    }
                    val = val.slice(0, -1);
                }
                
                let digits = val.substring(4).replace(/[^0-9]/g, '');
                let formatted = '010-';
                
                if (digits.length > 0) {
                    if (digits.length <= 4) {
                        formatted += digits;
                        if (digits.length === 4) {
                            formatted += '-';
                        }
                    } else {
                        formatted += digits.slice(0, 4) + '-' + digits.slice(4, 8);
                    }
                }
                
                e.target.value = formatted;
                previousValue = formatted;
                
                if (formatted.length === 13) {
                    authBtn.removeAttribute('disabled');
                } else {
                    authBtn.setAttribute('disabled', 'true');
                }
            });
        }

        if (form) {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const codeInput = document.getElementById('auth-code-input');
                const errorMsg = document.getElementById('error-message');
                if (codeInput) {
                    if (codeInput.value !== generatedCode) {
                        if (errorMsg) {
                            errorMsg.classList.remove('hidden');
                        } else {
                            alert('잘못된 인증번호입니다.');
                        }
                        return;
                    }
                    
                    if (errorMsg) {
                        errorMsg.classList.add('hidden');
                    }
                    const phoneVal = phoneInput.value.replace(/[^0-9]/g, '');
                    localStorage.setItem('authPhone', phoneVal);
                    window.location.href = 'password.html?phone=' + encodeURIComponent(phoneVal);
                }
            });
        }

        if (authBtn) {
            authBtn.addEventListener('click', () => {
                generatedCode = String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
                console.log('Generated code:', generatedCode);

                const phoneVal = phoneInput.value;
                const msg = `[기쁜 하루] 문자 인증 안내\n기쁜 하루 쇼핑몰 회원 가입을 위한 인증번호는 [${generatedCode}] 예요.`;

                fetch('/api/send-auth-sms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ receiver: phoneVal, code: generatedCode, message: msg })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert('인증번호가 전송되었습니다.');
                    } else {
                        alert('인증번호 발송 실패: ' + data.message);
                    }
                })
                .catch(err => {
                    console.error('SMS Send error:', err);
                });

                let codeInput = document.getElementById('auth-code-input');
                if (!codeInput) {
                    const container = document.createElement('div');
                    container.className = 'flex flex-col gap-sm mt-md';
                    container.id = 'auth-code-wrapper';

                    const label = document.createElement('label');
                    label.className = 'font-label-md text-label-md text-on-surface-variant ml-xs';
                    label.innerText = '인증번호';

                    codeInput = document.createElement('input');
                    codeInput.id = 'auth-code-input';
                    codeInput.maxLength = 6;
                    codeInput.placeholder = '인증번호 6자리 입력';
                    codeInput.type = 'text';
                    codeInput.inputMode = 'numeric';
                    codeInput.pattern = '[0-9]*';
                    codeInput.className = 'w-full bg-[#FDF8F4] border-[#655D49] border rounded-lg py-md px-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all placeholder:text-outline';

                    const errorMsg = document.createElement('p');
                    errorMsg.id = 'error-message';
                    errorMsg.className = 'text-error font-caption text-caption mt-xs hidden';
                    errorMsg.style.color = '#ba1a1a'; // Ensure it's visually red
                    errorMsg.innerText = '잘못된 인증번호입니다.';

                    codeInput.addEventListener('input', (e) => {
                        e.target.value = e.target.value.replace(/[^0-9]/g, '');
                        errorMsg.classList.add('hidden');
                        if (e.target.value.length === 6) {
                            nextBtn.removeAttribute('disabled');
                        } else {
                            nextBtn.setAttribute('disabled', 'true');
                        }
                    });

                    container.appendChild(label);
                    container.appendChild(codeInput);
                    container.appendChild(errorMsg);

                    const phoneBlock = authBtn.closest('.flex.flex-col.gap-sm');
                    phoneBlock.parentNode.insertBefore(container, phoneBlock.nextSibling);
                    
                    codeInput.focus();
                }
            });
        }
    });
</script>
</body></html>
