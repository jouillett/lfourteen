                        "secondary": "#625e50",

                        "on-primary-fixed": "#231a08",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        body {
            font-family: 'Inter', sans-serif;

<body class="bg-background min-h-screen flex flex-col items-center justify-center p-lg">
<!-- Top Section -->
<header class="w-full max-w-[440px] flex items-center gap-sm mb-lg">
<img src="https://capofcom.cafe24.com/l14_coordy/images/l14.jpeg" style="width: 24px; height: 24px; border-radius: 50%;margin-right: -5px; vertical-align: middle;">
<a class="text-headline-md font-headline-md font-bold text-primary" href="#">L14 Cordy</a>
</header>
<!-- Main Section (Login Card) -->
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl p-lg shadow-sm border border-surface-variant flex flex-col gap-md">
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">로그인</h2>
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="phone">휴대폰 번호</label>
<input class="w-full px-sm py-sm rounded-lg border border-outline-variant bg-surface-container-low text-on-surface font-body-md text-body-md focus:border-primary focus:ring-2 focus:ring-primary-container focus:outline-none transition-all placeholder:text-on-surface-variant/50" id="phone" placeholder="휴대폰 번호를 입력해주세요." type="tel"/>
<div id="phone-error" class="text-error font-caption text-caption mt-xs hidden"></div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">비밀번호</label>
<input class="w-full px-sm py-sm rounded-lg border border-outline-variant bg-surface-container-low text-on-surface font-body-md text-body-md focus:border-primary focus:ring-2 focus:ring-primary-container focus:outline-none transition-all placeholder:text-on-surface-variant/50" id="password" placeholder="비밀번호를 입력해주세요." type="password"/>
<div id="password-error" class="text-error font-caption text-caption mt-xs hidden"></div>
</div>
<!-- Action Area -->
<div class="flex items-center justify-between mt-sm">
<div class="flex items-center gap-xs font-label-md text-label-md text-on-surface-variant">
<a class="hover:text-primary transition-colors" href="#">회원가입</a>
<span>|</span>
<a class="hover:text-primary transition-colors" href="#">비밀번호 찾기</a>
</div>
<button class="bg-primary text-on-primary font-label-md text-label-md px-lg py-sm rounded-lg hover:bg-primary/90 transition-colors shadow-sm active:scale-95" type="submit">로그인</button>
</div>
</form>
</main><footer class="w-full max-w-[440px] mt-lg text-center font-caption text-caption text-on-surface-variant">
<p>© 2026 L14 Cordy. All rights reserved.</p>
</footer>
<!-- Footer -->
<script type="module">
    import { FormApi, FieldApi } from 'https://cdn.jsdelivr.net/npm/@tanstack/form-core@1.31.0/+esm';
    import { z } from 'https://esm.sh/zod@3.23.8';

    const formEl = document.querySelector('form');
    const phoneInput = document.getElementById('phone');
    const passwordInput = document.getElementById('password');

    if (formEl && phoneInput && passwordInput) {
        // Custom formatting helper
        function formatPhoneNumber(value) {
            let digits = value.replace(/\D/g, '');
            if (digits.startsWith('010010')) {
                digits = '010' + digits.substring(6);
            } else if (digits.length > 3 && !digits.startsWith('010')) {
                digits = '010' + digits;
            }
            const truncated = digits.substring(0, 11);
            if (truncated.length <= 3) {
                return truncated;
            } else if (truncated.length <= 7) {
                return `${truncated.substring(0, 3)}-${truncated.substring(3)}`;
            } else {
                return `${truncated.substring(0, 3)}-${truncated.substring(3, 7)}-${truncated.substring(7)}`;
            }
        }

        // Initialize TanStack Form
        const form = new FormApi({
            defaultValues: {
                phone: '',
                password: ''
            },
            onSubmit: async ({ value }) => {
                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            mobile: value.phone,
                            password: value.password,
                        }),
                    });

                    const result = await response.json();
                    if (result.success) {
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userId', result.userId);
                        const loginRedirect = localStorage.getItem('loginRedirect');
                        if (loginRedirect) {
                            localStorage.removeItem('loginRedirect');
                            window.location.href = loginRedirect;
                        } else {
                            const pendingAction = localStorage.getItem('pendingCartAction');
                            if (pendingAction) {
                                window.location.href = 'mall.html';
                            } else {
                                window.location.href = 'cart.html';
                            }
                        }
                    } else {
                        if (result.code === 'INCORRECT_PASSWORD') {
                            if (confirm("잘못된 비밀번호입니다. 새비밀번호 설정을 할까요?")) {
                                window.location.href = 'password_auth.html';
                            }
                        } else {
                            if (confirm("아직 등록되지 않은 회원입니다.\n가입하시겠습니까?")) {
                                window.location.href = 'join_auth.html?phone=' + encodeURIComponent(value.phone);
                            }
                        }
                    }
                } catch (error) {
                    console.warn('Backend not reachable. Mocking login for static HTML.', error);
                    let mockUserId = 1;
                    if (value.phone.includes('7337')) mockUserId = 2;
                    else if (value.phone.includes('1111')) mockUserId = 3;
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userId', mockUserId.toString());
                    const loginRedirect = localStorage.getItem('loginRedirect');
                    if (loginRedirect) {
                        localStorage.removeItem('loginRedirect');
                        window.location.href = loginRedirect;
                    } else {
                        const pendingAction = localStorage.getItem('pendingCartAction');
                        if (pendingAction) {
                            window.location.href = 'mall.html';
                        } else {
                            window.location.href = 'cart.html';
                        }
                    }
                    return;
                    console.error('Error during login:', error);
                    alert('로그인 처리 중 오류가 발생했습니다.');
                }
            }
        });

        // Initialize TanStack Form Fields
        const phoneField = new FieldApi({
            form,
            name: 'phone',
            validators: {
                onChange: ({ value }) => {
                    const result = z.string()
                        .min(1, "휴대폰 번호를 입력해주세요.")
                        .regex(/^010-\d{4}-\d{4}$/, "휴대폰 번호는 010-****-**** 형식이어야 합니다.")
                        .safeParse(value);
                    return result.success ? undefined : result.error.errors[0].message;
                },
                onBlur: ({ value }) => {
                    const result = z.string()
                        .min(1, "휴대폰 번호를 입력해주세요.")
                        .regex(/^010-\d{4}-\d{4}$/, "휴대폰 번호는 010-****-**** 형식이어야 합니다.")
                        .safeParse(value);
                    return result.success ? undefined : result.error.errors[0].message;
                }
            }
        });

        const passwordField = new FieldApi({
            form,
            name: 'password',
            validators: {
                onChange: ({ value }) => {
                    const result = z.string()
                        .min(1, "비밀번호를 입력해주세요.")
                        .regex(/^[\x21-\x7E]+$/, "비밀번호는 영문, 숫자, 특수문자만 입력 가능합니다.")
                        .safeParse(value);
                    return result.success ? undefined : result.error.errors[0].message;
                },
                onBlur: ({ value }) => {
                    const result = z.string()
                        .min(1, "비밀번호를 입력해주세요.")
                        .regex(/^[\x21-\x7E]+$/, "비밀번호는 영문, 숫자, 특수문자만 입력 가능합니다.")
                        .safeParse(value);
                    return result.success ? undefined : result.error.errors[0].message;
                }
            }
        });

        // Mount the fields to the FormApi instance
        phoneField.mount();
        passwordField.mount();

        // Subscribe to form state to dynamically update UI errors
        form.store.subscribe(() => {
            const phoneMeta = form.getFieldMeta('phone');
            const phoneErrorEl = document.getElementById('phone-error');
            if (phoneMeta && phoneMeta.isTouched && phoneMeta.errors && phoneMeta.errors.length > 0) {
                phoneErrorEl.textContent = phoneMeta.errors[0];
                phoneErrorEl.classList.remove('hidden');
            } else {
                phoneErrorEl.textContent = '';
                phoneErrorEl.classList.add('hidden');
            }

            const passwordMeta = form.getFieldMeta('password');
            const passwordErrorEl = document.getElementById('password-error');
            if (passwordMeta && passwordMeta.isTouched && passwordMeta.errors && passwordMeta.errors.length > 0) {
                passwordErrorEl.textContent = passwordMeta.errors[0];
                passwordErrorEl.classList.remove('hidden');
            } else {
                passwordErrorEl.textContent = '';
                passwordErrorEl.classList.add('hidden');
            }
        });

        // Event Listeners for Phone Input UI
        phoneInput.addEventListener('focus', () => {
            let val = phoneInput.value;
            if (!val.startsWith('010-')) {
                const digits = val.replace(/\D/g, '');
                const suffix = digits.startsWith('010') ? digits.substring(3) : digits;
                phoneInput.value = '010-' + suffix;
                phoneInput.value = formatPhoneNumber(phoneInput.value);
            }
            phoneField.handleChange(phoneInput.value);

            setTimeout(() => {
                const len = phoneInput.value.length;
                phoneInput.setSelectionRange(len, len);
            }, 0);
        });

        phoneInput.addEventListener('input', (e) => {
            let val = phoneInput.value;
            if (val === '') {
                phoneField.handleChange('');
                return;
            }
            if (!val.startsWith('010-')) {
                const digits = val.replace(/\D/g, '');
                const suffix = digits.startsWith('010') ? digits.substring(3) : digits;
                val = '010-' + suffix;
            }
            const prefix = '010-';
            const suffix = val.substring(4).replace(/\D/g, '');
            const formatted = formatPhoneNumber(prefix + suffix);
            phoneInput.value = formatted;

            phoneField.handleChange(formatted);
        });

        phoneInput.addEventListener('blur', () => {
            phoneField.handleBlur();
        });

        phoneInput.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' || e.key === 'Delete') {
                if (phoneInput.selectionStart === 0 && phoneInput.selectionEnd === phoneInput.value.length) {
                    return;
                }
                if (phoneInput.selectionStart <= 4) {
                    e.preventDefault();
                }
            }
        });

        const enforceCursor = () => {
            if (phoneInput.value.length >= 4 && phoneInput.selectionStart < 4) {
                if (phoneInput.selectionStart === 0 && phoneInput.selectionEnd === phoneInput.value.length) {
                    return;
                }
                phoneInput.setSelectionRange(4, 4);
            }
        };

        phoneInput.addEventListener('click', enforceCursor);
        phoneInput.addEventListener('keyup', enforceCursor);
        phoneInput.addEventListener('select', enforceCursor);

        // Event Listeners for Password Input UI
        passwordInput.addEventListener('input', () => {
            const sanitized = passwordInput.value.replace(/[^\x21-\x7E]/g, '');
            passwordInput.value = sanitized;
            passwordField.handleChange(sanitized);
        });

        passwordInput.addEventListener('blur', () => {
            passwordField.handleBlur();
        });

        // Form Submit
        formEl.addEventListener('submit', (e) => {
            e.preventDefault();
            e.stopPropagation();
            form.handleSubmit();
        });
    }
</script>
</body></html>
