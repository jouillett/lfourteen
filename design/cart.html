<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        
        const userId = localStorage.getItem('userId');
        const cartEl = document.getElementById('cart') || document.getElementById('cart_count');
        const cartSection = document.getElementById('cart section');

        const updateTotal = () => {
            let totalPrice = 0;
            const items = cartSection ? cartSection.querySelectorAll('.cart-item-row') : [];
            let allChecked = true;
            let anyExists = false;

            items.forEach(item => {
                anyExists = true;
                const checkbox = item.querySelector('.item-checkbox');
                const priceEl = item.querySelector('.item-total-price');
                const qtyInput = item.querySelector('.item-qty-input');
                
                const unitPrice = parseFloat(item.dataset.unitPrice || 0);
                let qty = parseInt(qtyInput.value);
                if (isNaN(qty) || qty < 1) qty = 1;
                
                const currentItemPrice = unitPrice * qty;
                if (priceEl) priceEl.textContent = currentItemPrice.toLocaleString() + '원';

                if (checkbox && checkbox.checked) {
                    totalPrice += currentItemPrice;
                } else {
                    allChecked = false;
                }
            });

            if (!anyExists) allChecked = false;

            // Sync all "Select All" checkboxes in the document
            const selectAllCheckboxes = Array.from(document.querySelectorAll('input[type="checkbox"]')).filter(cb => {
                const parent = cb.closest('label') || cb.parentElement;
                return parent && parent.textContent.includes('전체 선택');
            });
            selectAllCheckboxes.forEach(cb => {
                cb.checked = allChecked;
            });

            // Sync all "Select All" buttons in the document
            const selectAllBtns = Array.from(document.querySelectorAll('button')).filter(btn => btn.textContent.includes('전체 선택'));
            selectAllBtns.forEach(btn => {
                const icon = btn.querySelector('.material-symbols-outlined');
                if (icon) {
                    icon.textContent = allChecked ? 'check_box' : 'check_box_outline_blank';
                }
            });

            // Update summary
            const summarySpans = document.querySelectorAll('span');
            for (let i = 0; i < summarySpans.length; i++) {
                const txt = summarySpans[i].textContent.trim();
                if (txt === '총 상품금액' || txt === '최종 결제 금액' || txt === '결제예정금액') {
                    if (summarySpans[i+1]) {
                        summarySpans[i+1].textContent = totalPrice.toLocaleString() + '원';
                    }
                }
            }
            // Make the number of cart icons in the header reflect whenever an item is deleted.
            if (cartEl) {
                cartEl.textContent = items.length;
                cartEl.style.display = items.length > 0 ? 'flex' : 'none';
            }
        };

        // Event Delegation for all interactive elements
        document.addEventListener('change', (e) => {
            if (e.target.matches('input[type="checkbox"]')) {
                const parent = e.target.closest('label') || e.target.parentElement;
                if (parent && parent.textContent.includes('전체 선택')) {
                    const isChecked = e.target.checked;
                    const allItemsCb = document.querySelectorAll('.item-checkbox');
                    allItemsCb.forEach(icb => {
                        icb.checked = isChecked;
                    });
                    updateTotal();
                } else if (e.target.matches('.item-checkbox')) {
                    updateTotal();
                }
            } else if (e.target.matches('.item-qty-input')) {
                let v = parseInt(e.target.value);
                if (isNaN(v) || v < 1) e.target.value = 1;
                updateTotal();
            }
        });

        document.addEventListener('click', (e) => {
            const btnContinueShopping = e.target.closest('button');
            if (btnContinueShopping && btnContinueShopping.textContent.includes('쇼핑 계속')) {
                e.preventDefault();
                const isMobile = window.location.pathname.includes('mcart.html') || window.innerWidth < 768;
                window.location.href = isMobile ? 'mmall.html' : 'mall.html';
                return;
            }

            const btnSelectAll = e.target.closest('button');
            if (btnSelectAll && btnSelectAll.textContent.includes('전체 선택')) {
                e.preventDefault();
                const allItemsCb = document.querySelectorAll('.item-checkbox');
                let allChecked = true;
                allItemsCb.forEach(icb => {
                    if (!icb.checked) allChecked = false;
                });
                
                const newState = !allChecked;
                allItemsCb.forEach(icb => {
                    icb.checked = newState;
                });
                updateTotal();
                return;
            }

            const btnEmptyCart = e.target.closest('#empty-cart-btn');
            if (btnEmptyCart && btnEmptyCart.textContent.includes('장바구니 비우기')) {
                e.preventDefault();
                if (confirm('장바구니를 전부 비우시겠습니까?')) {
                    const doRedirect = () => {
                        alert('장바구니를 비웠습니다.');
                        const isMobile = window.location.pathname.includes('mcart.html') || window.innerWidth < 768;
                        window.location.href = isMobile ? 'mmall.html' : 'mall.html';
                    };

                    if (!userId) {
                        doRedirect();
                        return;
                    }

                    fetch('/api/cart/empty', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: Number(userId) })
                    }).then(res => res.json()).then(data => {
                        doRedirect();
                    }).catch(err => {
                        console.error(err);
                        doRedirect();
                    });
                }
                return;
            }

            const btnDeleteSelected = e.target.closest('button');
            if (btnDeleteSelected && btnDeleteSelected.textContent.includes('선택 삭제')) {
                e.preventDefault();
                if (confirm('선택하신 상품을 삭제하시겠습니까?')) {
                    const checkedItems = document.querySelectorAll('.cart-item-row .item-checkbox:checked');
                    
                    if (userId) {
                        const deletePromises = Array.from(checkedItems).map(cb => {
                            const row = cb.closest('.cart-item-row');
                            if (row && row.dataset.cartId) {
                                return fetch('/api/cart/remove', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ cartItemId: Number(row.dataset.cartId) })
                                }).then(() => {
                                    if (row) row.remove();
                                }).catch(err => {
                                    console.error(err);
                                    if (row) row.remove();
                                });
                            }
                            return Promise.resolve();
                        });

                        Promise.all(deletePromises).then(() => {
                            updateTotal();
                        });
                    } else {
                        checkedItems.forEach(cb => {
                            const row = cb.closest('.cart-item-row');
                            if (row) row.remove();
                        });
                        updateTotal();
                    }
                }
                return;
            }

            const btnRemove = e.target.closest('button[aria-label="Remove item"]');
            const btnDec = e.target.closest('.btn-decrease');
            const btnInc = e.target.closest('.btn-increase');
            
            if (btnRemove) {
                e.preventDefault();
                const itemRow = btnRemove.closest('.cart-item-row');
                if (itemRow) {
                    const cartId = itemRow.dataset.cartId;
                    if (cartId && userId) {
                        fetch('/api/cart/remove', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ cartItemId: Number(cartId) })
                        }).then(res => res.json()).then(data => {
                            itemRow.remove();
                            updateTotal();
                        }).catch(err => {
                            console.error(err);
                            itemRow.remove();
                            updateTotal();
                        });
                    } else {
                        itemRow.remove();
                        updateTotal();
                    }
                }
            } else if (btnDec) {
                e.preventDefault();
                const qtyInput = btnDec.parentElement.querySelector('.item-qty-input');
                if (qtyInput) {
                    let v = parseInt(qtyInput.value) || 1;
                    if (v > 1) {
                        qtyInput.value = v - 1;
                        updateTotal();
                    }
                }
            } else if (btnInc) {
                e.preventDefault();
                const qtyInput = btnInc.parentElement.querySelector('.item-qty-input');
                if (qtyInput) {
                    let v = parseInt(qtyInput.value) || 1;
                    qtyInput.value = v + 1;
                    updateTotal();
                }
            }
        });

        if (userId) {
            fetch('/api/cart/list?userId=' + userId)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.items) {
                        const N = data.items.length;
                        if (cartEl) {
                            cartEl.textContent = N;
                            cartEl.style.display = N > 0 ? 'flex' : 'none';
                        }

                        if (cartSection) {
                            const children = Array.from(cartSection.children);
                            const lastChild = children[children.length - 1];
                            let bulkNode = null;
                            if (lastChild && lastChild.innerHTML.includes('전체 선택')) {
                                bulkNode = lastChild.cloneNode(true);
                            }

                            cartSection.innerHTML = '';

                            data.items.forEach(item => {
                                const itemPrice = item.cart_quantity * item.price;

                                const itemHtml = `
                                <div class="cart-item-row bg-surface-container-low rounded-lg p-md flex flex-col md:flex-row items-start md:items-center gap-md border border-outline-variant/30 transition-all hover:bg-surface-container relative group" data-cart-id="${item.cart_item_id}" data-unit-price="${item.price}">
                                    <div class="absolute top-md left-md z-10 md:static md:flex md:h-5 md:items-center md:mr-2">
                                        <input checked class="item-checkbox h-5 w-5 md:h-4 md:w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container cursor-pointer shadow-sm md:shadow-none" type="checkbox"/>
                                    </div>
                                    <div class="flex items-center gap-md w-full md:w-auto flex-grow">
                                        <div class="w-24 h-24 md:w-20 md:h-20 flex-shrink-0 bg-surface-container rounded-lg overflow-hidden relative border border-outline-variant/20 ml-8 md:ml-0">
                                            <img alt="Product Image" class="w-full h-full object-cover" src="${item.image || ''}"/>
                                        </div>
                                        <div class="flex flex-col flex-grow">
                                            <h3 class="font-label-md text-label-md text-on-surface mb-xs font-semibold line-clamp-2">${item.description || ''}</h3>
                                            <p class="font-caption text-caption text-on-surface-variant">${item.priced_quantity}개</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center justify-between w-full md:w-auto gap-md md:gap-lg mt-sm md:mt-0 pt-sm md:pt-0 border-t border-outline-variant/30 md:border-none">
                                        <div class="flex items-center border border-outline-variant rounded-lg bg-surface h-10 w-24">
                                            <button aria-label="Decrease quantity" class="btn-decrease px-2 text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center h-full w-1/3 border-r border-outline-variant">
                                                <span class="material-symbols-outlined text-[16px]" data-icon="remove">remove</span>
                                            </button>
                                            <input class="item-qty-input w-1/3 h-full border-none bg-transparent text-center font-label-md text-label-md text-on-surface p-0 focus:ring-0" min="1" type="number" value="${item.cart_quantity}"/>
                                            <button aria-label="Increase quantity" class="btn-increase px-2 text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center h-full w-1/3 border-l border-outline-variant">
                                                <span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
                                            </button>
                                        </div>
                                        <div class="text-right flex-shrink-0 min-w-[80px]">
                                            <span class="item-total-price font-label-md text-label-md text-on-surface font-semibold">${itemPrice.toLocaleString()}원</span>
                                        </div>
                                        <button aria-label="Remove item" class="text-on-surface-variant hover:text-error transition-colors p-xs rounded-full hover:bg-error-container absolute top-2 right-2 md:static md:p-xs">
                                            <span class="material-symbols-outlined text-xl" data-icon="close">close</span>
                                        </button>
                                    </div>
                                </div>
                                `;
                                cartSection.insertAdjacentHTML('beforeend', itemHtml);
                            });

                            if (bulkNode) {
                                cartSection.appendChild(bulkNode);
                            }

                            updateTotal(); // Calculate initial total
                        }
                    } else {
                        if (cartEl) { cartEl.textContent = ''; cartEl.style.display = 'none'; }
                    }
                })
                .catch(err => {
                    console.error(err);
                    if (cartEl) { cartEl.textContent = ''; cartEl.style.display = 'none'; }
                });
        } else {
            if (cartEl) { cartEl.textContent = ''; cartEl.style.display = 'none'; }
        }

        const headerProfileBtn = document.getElementById('header-profile-btn');
        if (headerProfileBtn) {
            headerProfileBtn.addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userId');
                alert('로그아웃 되었습니다.');
                window.location.href = 'mall.html';
            });
        }
    });
</script>
</body></html>
